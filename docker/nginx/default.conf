upstream django { server web:8000; }
server {
  listen 80;
  server_name ${DOMAIN_NAME};
  client_max_body_size ${NGINX_CLIENT_MAX_BODY_SIZE};
  proxy_connect_timeout 10s; proxy_send_timeout 120s; proxy_read_timeout 120s;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy same-origin always;
  add_header X-Frame-Options DENY always;
  location /static/ { alias /srv/static/; expires 7d; }
  location /media/ { alias /srv/media/; expires 1h; }
  location /_protected_media/ { internal; alias /srv/protected_media/; }
  location / {
    proxy_pass http://django;
    proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
