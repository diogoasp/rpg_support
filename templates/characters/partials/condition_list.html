<div id="condition-list">{% for c in character.conditions.all %}{% if c.is_active %}<span class="badge bg-danger">{{c.name}}{% if user.is_master %} <button class="btn-close btn-close-white" hx-post="{% url 'characters:condition_deactivate' c.pk %}" hx-headers='{"X-CSRFToken":"{{csrf_token}}"}' hx-target="#condition-list"></button>{% endif %}</span>{% endif %}{% empty %}<span class="text-secondary">Sem condições ativas.</span>{% endfor %}</div>
