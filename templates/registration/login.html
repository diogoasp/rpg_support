{% extends "base.html" %}
{% block title %}Entrar · Grand Line Companion{% endblock %}
{% block content %}
<div class="row justify-content-center py-5"><div class="col-md-6 col-lg-4">
  <div class="card border-0 shadow-sm"><div class="card-body p-4">
    <h1 class="h3 mb-4">Entrar na campanha</h1>
    {% if form.errors %}<div class="alert alert-danger">Usuário ou senha inválidos.</div>{% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3"><label class="form-label" for="id_username">Usuário</label><input class="form-control" id="id_username" name="username" required autofocus></div>
      <div class="mb-4"><label class="form-label" for="id_password">Senha</label><input class="form-control" type="password" id="id_password" name="password" required></div>
      {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
      <button class="btn btn-primary w-100" type="submit">Entrar</button>
    </form>
  </div></div>
</div></div>
{% endblock %}
