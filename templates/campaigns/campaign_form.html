{% extends "base.html" %}
{% block title %}{% if object %}Editar{% else %}Nova{% endif %} campanha{% endblock %}
{% block content %}<div class="row justify-content-center"><div class="col-lg-8"><div class="card border-0 shadow-sm"><div class="card-body p-4"><h1 class="h3 mb-4">{% if object %}Editar campanha{% else %}Nova campanha{% endif %}</h1><form method="post" enctype="multipart/form-data">{% csrf_token %}{{ form.as_p }}<div class="d-flex gap-2"><button class="btn btn-primary" type="submit">Salvar</button><a class="btn btn-outline-secondary" href="{% url 'dashboard:master' %}">Cancelar</a></div></form></div></div></div></div>{% endblock %}
