 data-audio-channel="{{ asset.default_channel }}" data-audio-volume="{{ asset.default_volume }}" data-audio-loop="{{ asset.default_loop|yesno:'true,false' }}"
 data-audio-url="{% url 'audio_panel:file' asset.pk %}" data-register-url="{% url 'audio_panel:register_play' asset.pk %}">
 Tocar
</button>
