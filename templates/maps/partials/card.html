<article id="map-{{ map.pk }}" class="card h-100"><div class="card-body">{% if map.image %}<img class="map-thumb" loading="lazy" src="{% url 'maps:file' map.pk 'image' %}" alt="{{ map.title }}">{% endif %}<h2 class="h5 mt-2">{{ map.title }}</h2><p>{{ map.description|truncatewords:25 }}</p><span class="badge text-bg-{% if map.is_visible_to_players %}success{% else %}secondary{% endif %}">{{ map.visibility_label }}</span>{% if map.file %}<a href="{% url 'maps:file' map.pk 'file' %}">Baixar PDF</a>{% endif %}{% if is_master %}<button class="btn btn-sm btn-outline-primary" hx-get="{% url 'maps:visibility' campaign.slug map.pk %}" hx-target="#modal-content">Visibilidade</button>{% endif %}</div></article>
